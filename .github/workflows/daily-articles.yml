name: Daily Article Generation

on:
  schedule:
    # 平日午前9時（JST = UTC 0:00）
    - cron: "0 0 * * 1-5"
  workflow_dispatch: # 手動実行
  push:
    branches:
      - main
    paths:
      - "backend/services/source_aggregator_service.py"
      - "backend/services/content_automation_service.py"
      - "backend/models/automated_content.py"
      - "scripts/generate_daily_article.py"
      - ".github/workflows/daily-articles.yml"

concurrency:
  group: daily-article-generation
  cancel-in-progress: false

jobs:
  generate-articles:
    name: Generate Daily Articles
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python version
        run: |
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install feedparser  # For RSS parsing

      - name: Verify dependencies installed
        run: |
          cd backend
          pip list | grep -E "(requests|feedparser|sqlalchemy)" || exit 1

      - name: Resolve DATABASE_URL for Supabase pooler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ACTIVE_DATABASE_URL=" >> "$GITHUB_ENV"
            echo "DATABASE_URL_SOURCE=missing" >> "$GITHUB_ENV"
            echo "⚠️ DATABASE_URL not set"
            exit 0
          fi

          python3 <<'PY'
          import os
          from urllib.parse import parse_qsl, urlencode, urlparse, urlunparse
          import psycopg2

          db_url = os.environ["DATABASE_URL"]

          def with_sslmode_require(url: str) -> str:
            p = urlparse(url)
            params = dict(parse_qsl(p.query, keep_blank_values=True))
            params.setdefault("sslmode", "require")
            return urlunparse(
              (p.scheme, p.netloc, p.path or "/postgres", p.params, urlencode(params), p.fragment)
            )

          def candidate_direct_url(url: str) -> str | None:
            p = urlparse(url)
            host = p.hostname or ""
            username = p.username or ""
            if not host.endswith("pooler.supabase.com"):
              return None
            if not username.startswith("postgres."):
              return None
            project_ref = username.split(".", 1)[1]
            if not project_ref:
              return None
            password = p.password or ""
            port = 5432
            netloc = f"postgres:{password}@db.{project_ref}.supabase.co:{port}"
            converted = urlunparse((p.scheme, netloc, p.path or "/postgres", p.params, p.query, p.fragment))
            return with_sslmode_require(converted)

          def can_connect(url: str) -> bool:
            try:
              conn = psycopg2.connect(url, connect_timeout=5)
              conn.close()
              return True
            except Exception:
              return False

          original = with_sslmode_require(db_url)
          direct = candidate_direct_url(original)

          active = original
          source = "original"

          if not can_connect(original) and direct:
            if can_connect(direct):
              active = direct
              source = "supabase-direct-fallback"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"ACTIVE_DATABASE_URL={active}\n")
            f.write(f"DATABASE_URL_SOURCE={source}\n")

          print(f"::add-mask::{active}")
          print(f"Resolved DATABASE_URL source: {source}")
          PY

      - name: Check database connection
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set, skipping database connection check"
            exit 0
          fi
          python3 -c "from pathlib import Path; import sys; sys.path.insert(0, str(Path('backend'))); from database import SessionLocal; db = SessionLocal(); db.close(); print('✅ Database connection OK')"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          set +e  # 一時的にエラーで停止しない
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set, skipping migrations"
            exit 0
          fi
          cd backend
          # Check if PostgreSQL (not SQLite)
          if [[ "$DATABASE_URL" == *"postgresql"* ]]; then
            echo "🔄 Running database migrations..."
            MIGRATION_OUTPUT=$(python3 -m alembic upgrade head 2>&1)
            MIGRATION_EXIT_CODE=$?
            echo "$MIGRATION_OUTPUT"
            
            set -e  # エラーで停止を有効化
            
            if [ $MIGRATION_EXIT_CODE -ne 0 ]; then
              echo "::error::Migration failed"
              echo "ERROR_TYPE=migration" >> $GITHUB_ENV
              echo "ERROR_MESSAGE<<EOF" >> $GITHUB_ENV
              echo "$MIGRATION_OUTPUT" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              exit 1
            fi
            echo "✅ Migrations completed"
          else
            echo "ℹ️  SQLite detected, skipping migrations (tables created automatically)"
          fi

      - name: Verify scripts exist
        run: |
          test -f scripts/generate_daily_article.py || exit 1
          chmod +x scripts/generate_daily_article.py || true
          echo "✅ Script exists"

      - name: Run article generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          python3 scripts/generate_daily_article.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Daily Article Generation Failed',
              body: `Daily article generation failed on ${new Date().toISOString()}\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['automation', 'bug']
            })
