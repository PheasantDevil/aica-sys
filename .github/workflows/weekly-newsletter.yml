name: Weekly Newsletter Generation

on:
  schedule:
    # 毎週月曜日午前8時（JST = UTC 23:00 日曜）
    - cron: "0 23 * * 0"
  workflow_dispatch: # 手動実行
  push:
    branches:
      - main
    paths:
      - "backend/models/automated_content.py"
      - "scripts/generate_newsletter.py"
      - ".github/workflows/weekly-newsletter.yml"

concurrency:
  group: weekly-newsletter-generation
  cancel-in-progress: false

jobs:
  generate-newsletter:
    name: Generate Weekly Newsletter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python version
        run: |
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify dependencies installed
        run: |
          cd backend
          pip list | grep -E "(sqlalchemy|pydantic)" || exit 1

      - name: Resolve DATABASE_URL for Supabase pooler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ACTIVE_DATABASE_URL=" >> "$GITHUB_ENV"
            echo "⚠️ DATABASE_URL not set"
            exit 0
          fi

          python3 <<'PY'
          import os
          from urllib.parse import parse_qsl, urlencode, urlparse, urlunparse
          import psycopg2

          db_url = os.environ["DATABASE_URL"]

          def with_sslmode_require(url: str) -> str:
            p = urlparse(url)
            params = dict(parse_qsl(p.query, keep_blank_values=True))
            params.setdefault("sslmode", "require")
            return urlunparse(
              (p.scheme, p.netloc, p.path or "/postgres", p.params, urlencode(params), p.fragment)
            )

          def candidate_direct_url(url: str) -> str | None:
            p = urlparse(url)
            host = p.hostname or ""
            username = p.username or ""
            if not host.endswith("pooler.supabase.com"):
              return None
            if not username.startswith("postgres."):
              return None
            project_ref = username.split(".", 1)[1]
            if not project_ref:
              return None
            password = p.password or ""
            port = 5432
            netloc = f"postgres:{password}@db.{project_ref}.supabase.co:{port}"
            converted = urlunparse((p.scheme, netloc, p.path or "/postgres", p.params, p.query, p.fragment))
            return with_sslmode_require(converted)

          def can_connect(url: str) -> bool:
            try:
              conn = psycopg2.connect(url, connect_timeout=5)
              conn.close()
              return True
            except Exception as e:
              print(f"Database connectivity check failed: {e.__class__.__name__}: {e}")
              return False

          original = with_sslmode_require(db_url)
          direct = candidate_direct_url(original)
          active = ""
          source = "unreachable"

          if can_connect(original):
            active = original
            source = "original"
          elif direct and can_connect(direct):
            active = direct
            source = "supabase-direct-fallback"
          else:
            print("No reachable DATABASE_URL candidate found; downstream DB steps will be skipped.")

          if active:
            print(f"::add-mask::{active}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"ACTIVE_DATABASE_URL={active}\n")
          print(f"Resolved DATABASE_URL source: {source}")
          PY

      - name: Check database connection
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set, skipping database connection check"
            exit 0
          fi
          python3 -c "from pathlib import Path; import sys; sys.path.insert(0, str(Path('backend'))); from database import SessionLocal; db = SessionLocal(); db.close(); print('✅ Database connection OK')"

      - name: Verify scripts exist
        run: |
          test -f scripts/generate_newsletter.py || exit 1
          chmod +x scripts/generate_newsletter.py || true
          echo "✅ Script exists"

      - name: Check data availability
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set, skipping data availability check"
            exit 0
          fi
          python3 -c "
          from pathlib import Path
          import sys
          from datetime import datetime, timedelta
          sys.path.insert(0, str(Path('backend')))
          from database import SessionLocal
          from models.automated_content import TrendDataDB, AutomatedContentDB
          db = SessionLocal()
          week_ago = datetime.utcnow() - timedelta(days=7)
          trends_count = db.query(TrendDataDB).filter(TrendDataDB.detected_at >= week_ago).count()
          articles_count = db.query(AutomatedContentDB).filter(AutomatedContentDB.created_at >= week_ago).count()
          db.close()
          print(f'✅ Data available: {trends_count} trends, {articles_count} articles')
          "

      - name: Run newsletter generation
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ ACTIVE_DATABASE_URL not resolved, skipping newsletter generation"
            exit 0
          fi
          set +e  # 一時的にエラーで停止しない
          SCRIPT_OUTPUT=$(python3 scripts/generate_newsletter.py 2>&1)
          SCRIPT_EXIT_CODE=$?
          echo "$SCRIPT_OUTPUT"

          set -e  # エラーで停止を有効化

          if [ $SCRIPT_EXIT_CODE -ne 0 ]; then
            echo "::error::Newsletter generation failed"
            echo "ERROR_MESSAGE<<EOF" >> $GITHUB_ENV
            echo "$SCRIPT_OUTPUT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Weekly Newsletter Generation Failed',
              body: `Weekly newsletter generation failed on ${new Date().toISOString()}\n\nCheck the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['automation', 'bug']
            })
