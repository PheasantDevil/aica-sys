name: Social Media Auto Post

on:
  schedule:
    # 毎日 03:00 UTC (12:00 JST 相当)
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: social-media-post
  cancel-in-progress: false

jobs:
  social-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Resolve DATABASE_URL for Supabase pooler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ACTIVE_DATABASE_URL=" >> "$GITHUB_ENV"
            echo "⚠️ DATABASE_URL not set"
            exit 0
          fi

          python3 <<'PY'
          import os
          from urllib.parse import parse_qsl, urlencode, urlparse, urlunparse
          import psycopg2

          db_url = os.environ["DATABASE_URL"]

          def with_sslmode_require(url: str) -> str:
            p = urlparse(url)
            params = dict(parse_qsl(p.query, keep_blank_values=True))
            params.setdefault("sslmode", "require")
            return urlunparse(
              (p.scheme, p.netloc, p.path or "/postgres", p.params, urlencode(params), p.fragment)
            )

          def candidate_direct_url(url: str) -> str | None:
            p = urlparse(url)
            host = p.hostname or ""
            username = p.username or ""
            if not host.endswith("pooler.supabase.com"):
              return None
            if not username.startswith("postgres."):
              return None
            project_ref = username.split(".", 1)[1]
            if not project_ref:
              return None
            password = p.password or ""
            netloc = f"postgres:{password}@db.{project_ref}.supabase.co:5432"
            converted = urlunparse((p.scheme, netloc, p.path or "/postgres", p.params, p.query, p.fragment))
            return with_sslmode_require(converted)

          def can_connect(url: str) -> bool:
            try:
              conn = psycopg2.connect(url, connect_timeout=5)
              conn.close()
              return True
            except Exception as e:
              print(f"Database connectivity check failed: {e.__class__.__name__}: {e}")
              return False

          original = with_sslmode_require(db_url)
          direct = candidate_direct_url(original)
          active = ""
          source = "unreachable"

          if can_connect(original):
            active = original
            source = "original"
          elif direct and can_connect(direct):
            active = direct
            source = "supabase-direct-fallback"
          else:
            print("No reachable DATABASE_URL candidate found; downstream DB steps will be skipped.")

          if active:
            print(f"::add-mask::{active}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"ACTIVE_DATABASE_URL={active}\n")
          print(f"Resolved DATABASE_URL source: {source}")
          PY

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
        run: |
          set +e  # 一時的にエラーで停止しない
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set, skipping migrations"
            exit 0
          fi
          cd backend
          if [[ "$DATABASE_URL" == *"postgresql"* ]]; then
            echo "🔄 Running database migrations..."
            MIGRATION_OUTPUT=$(python3 -m alembic upgrade head 2>&1)
            MIGRATION_EXIT_CODE=$?
            echo "$MIGRATION_OUTPUT"
            
            set -e  # エラーで停止を有効化
            
            if [ $MIGRATION_EXIT_CODE -ne 0 ]; then
              echo "::error::Migration failed"
              echo "ERROR_TYPE=migration" >> $GITHUB_ENV
              echo "ERROR_MESSAGE<<EOF" >> $GITHUB_ENV
              echo "$MIGRATION_OUTPUT" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              exit 1
            fi
            echo "✅ Migrations completed"
          else
            echo "ℹ️  SQLite detected, skipping migrations (tables created automatically)"
          fi

      - name: Get day of week
        id: date
        run: echo "day=$(date -u +%u)" >> "$GITHUB_OUTPUT"

      - name: Post service introduction (Mon/Wed/Fri)
        if: ${{ steps.date.outputs.day == '1' || steps.date.outputs.day == '3' || steps.date.outputs.day == '5' }}
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ ACTIVE_DATABASE_URL not resolved, skipping service post"
            exit 0
          fi
          python scripts/post_to_social_media.py \
            --type service \
            --message "🚀 AICA-SyS で TypeScript トレンドを毎日キャッチ！AI が高品質な技術記事を自動生成します。" \
            --hashtags "#TypeScript,#AI,#開発ツール"

      - name: Post daily trend highlight
        env:
          DATABASE_URL: ${{ env.ACTIVE_DATABASE_URL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ ACTIVE_DATABASE_URL not resolved, skipping trend post"
            exit 0
          fi
          python scripts/post_to_social_media.py \
            --type trend \
            --title "Daily TypeScript Trend" \
            --summary "最新のTypeScriptエコシステム洞察をAICA-SySでチェック。AIが注目トピックを自動分析！" \
            --url "https://aica-sys.vercel.app/trends" \
            --hashtags "#TypeScript,#技術記事,#AI自動生成"
